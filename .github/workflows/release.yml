name: Release

on:
  workflow_run:
    workflows: [ "CI" ]
    types:
      - completed
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release @virtual-display/client
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Try downloading dist artifact (fallback safe)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: core-dist
          path: core/dist

      - name: Check if dist exists, or build
        working-directory: ./core
        run: |
          if [ ! -f "dist/virtual-display-client.umd.js" ]; then
            echo "dist folder missing or incomplete, rebuilding..."
            pnpm install --frozen-lockfile
            pnpm build
          else
            echo "Using dist from artifact"
          fi

      - name: Upload updated changelog (optional)
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: core/CHANGELOG.md

      - name: Run semantic release
        working-directory: ./core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run release
