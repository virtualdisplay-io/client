name: Release

on:
  workflow_run:
    workflows: [ "CI" ]
    types:
      - completed
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release @virtual-display/client
    if: github.event_name == 'workflow_run' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        working-directory: ./core
        run: pnpm install --frozen-lockfile

      - name: Run semantic release
        working-directory: ./core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run release
