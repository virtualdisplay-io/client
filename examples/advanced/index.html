<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Table of Infinite Awesomeness - Virtual Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./../_shared/assets/favicon.ico" type="image/x-icon" sizes="16x16" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<main class="mx-auto max-w-5xl px-4 py-10">
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
    <!-- Left: 3D model -->
    <section id="virtual-display-placeholder">
    </section>
    <!-- Right: Configurator & info -->
    <section>
      <h1 class="text-3xl font-bold mb-2">Table of Infinite Awesomeness</h1>
      <p class="text-2xl text-indigo-600 font-semibold mb-3">$3500</p>
      <form id="config-form" class="space-y-4"></form>
      <!-- Feature list -->
      <div class="mt-8 border-t border-gray-200 pt-4">
        <h2 class="text-lg font-medium mb-2">Features</h2>
        <ul class="list-disc pl-6 text-gray-700 space-y-1">
          <li>Only the best materials</li>
          <li>Ethically and locally made</li>
          <li>Pre-washed and pre-shrunk</li>
          <li>Machine wash cold with similar colors</li>
        </ul>
      </div>
    </section>
  </div>
</main>
<script type="module" src="./src/index.ts"></script>
</body>
</html>
