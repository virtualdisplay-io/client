<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tree Response Demo - Virtual Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./../_shared/assets/favicon.ico" type="image/x-icon" sizes="16x16" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen antialiased">
<main class="mx-auto max-w-3xl px-4 py-12">
  <div class="bg-white shadow-lg rounded-xl p-8 flex flex-col gap-8">
    <header>
      <h1 class="text-3xl font-bold mb-1">Tree Response Demo</h1>
      <p class="text-lg text-gray-500">Request the full model tree via the message bus and see the response live.</p>
    </header>

    <div class="grid md:grid-cols-2 gap-8">
      <!-- Left: Virtual Display -->
      <section>
        <div id="virtual-display-placeholder" class="aspect-video w-full rounded-lg overflow-hidden border border-gray-200 shadow">
          <!-- Virtual Display iframe will be inserted here by the builder -->
        </div>
        <p class="mt-2 text-xs text-gray-400 text-center">3D model viewer with interactive tree response capability.</p>
      </section>

      <!-- Right: Interaction & Output -->
      <section class="flex flex-col h-full">
        <button
          id="requestTreeBtn"
          class="w-full px-4 py-2 mb-4 rounded bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow transition"
        >
          Request Model Tree
        </button>
        <div class="flex-1">
          <div class="text-sm text-gray-600 mb-1 font-medium">Tree response:</div>
          <pre
            id="output"
            class="overflow-auto bg-gray-50 rounded border border-gray-200 p-3 text-xs leading-snug min-h-[140px] max-h-[400px] font-mono text-gray-800"
          ></pre>
        </div>
      </section>
    </div>
  </div>
</main>
<script type="module" src="./src/main.ts"></script>
</body>
</html>
